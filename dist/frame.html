<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Delivery Design Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
    }
    .phone {
      width: 393px;
      height: 852px;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.2), 0 0 0 12px #1a1a1a;
      position: relative;
      background: #1a1a1a;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 32px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 10;
    }
    .phone iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 48px;
    }
    .label {
      margin-top: 24px;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="phone">
      <iframe src="./index.html"></iframe>
    </div>
    <p class="label">Bolt Delivery · Design Sandbox</p>
  </div>
</body>
</html>
